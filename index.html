<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Senhas</h1>
        
        <div class="result-container">
            <span id="password-display">S3nh4_StR0ng!</span>
            <button id="copy-btn" title="Copiar senha">Copiar</button>
        </div>

        <div class="settings">
            <div class="setting">
                <label for="length-slider">Comprimento: <span id="length-val">12</span></label>
                <input type="range" id="length-slider" min="6" max="25" value="12">
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="uppercase-cb" checked> Incluir Letras Maiúsculas
                </label>
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="lowercase-cb" checked> Incluir Letras Minúsculas
                </label>
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="numbers-cb" checked> Incluir Números
                </label>
            </div>

            <div class="setting">
                <label>
                    <input type="checkbox" id="symbols-cb"> Incluir Símbolos
                </label>
            </div>
        </div>

        <button id="generate-btn" class="btn-large">Gerar Senha</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
